<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yingyun.ai</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .domain {
      font-size: 1rem;
      color: #555;
      margin-top: 0.5rem;
      letter-spacing: 0.1em;
    }

    .tagline {
      margin-top: 2rem;
      font-size: 1.1rem;
      color: #666;
      max-width: 400px;
    }

    .links {
      margin-top: 3rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    .links a:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="name">yingyun.ai</h1>
    <p class="domain">yingyun.ai</p>
    <p class="tagline">Coming soon.</p>
    <nav class="links">
      <a href="mailto:aiyingyun@gmail.com">Email</a>
    </nav>
  </div>
</body>
</html>
